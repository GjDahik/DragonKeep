<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DragonKeep — Iniciar sesión</title>
    <meta name="theme-color" content="#2c1810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <script>
      (function(){ if (location.protocol === 'http:' || location.protocol === 'https:') { var l = document.createElement('link'); l.rel = 'manifest'; l.href = './manifest.webmanifest'; document.head.appendChild(l); } })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=4">
</head>
<body>
    <!-- Pantalla de transición (fuego) entre login y app -->
    <div class="fire-transition-screen" id="fire-transition-screen" aria-hidden="true" style="display: none;">
        <div class="fire-transition-inner">
            <img src="./icons/icon-192.png" alt="" class="fire-transition-icon" id="fire-transition-icon">
        </div>
    </div>

    <!-- Modal Login -->
    <div class="modal-overlay active" id="login-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>🔐 Iniciar Sesión</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Tipo de usuario</label>
                    <select id="login-user-type" onchange="typeof toggleLoginFields==='function'&&toggleLoginFields()">
                        <option value="dm">👑 Dungeon Master</option>
                        <option value="player">⚔️ Aventurero</option>
                    </select>
                </div>
                <div class="form-group" id="login-dm-name-group">
                    <label>Nombre del DM</label>
                    <input type="text" id="login-nombre" placeholder="Nombre del DM">
                </div>
                <div class="form-group" id="login-player-select-group" style="display: none;">
                    <label>Aventurero</label>
                    <select id="login-player-select">
                        <option value="">— Selecciona tu aventurero —</option>
                    </select>
                    <p style="color: #8b7355; font-size: 0.85em; margin-top: 6px;">Lista de aventureros creados por el DM en el dashboard.</p>
                </div>
                <div class="form-group">
                    <label>PIN</label>
                    <input type="password" id="login-pin" maxlength="10" placeholder="Tu PIN">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="handleLogin()">🔐 Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer class="metal-plaque-footer">
        <div class="metal-plaque">
            <span class="screw-bottom-left"></span>
            <span class="screw-bottom-right"></span>
            <div class="metal-plaque-content">
                <div class="metal-plaque-text">powered by GjDahik</div>
                <div class="metal-plaque-subtitle" id="footer-tagline">Caos a la orden del dia</div>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/login-common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/firestore-subscriptions.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
