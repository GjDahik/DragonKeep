<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Battle Tracker - DragonKeep</title>
<link rel="icon" type="image/png" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',serif;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%231a1a1f"/><circle cx="50" cy="50" r="1" fill="%232a2a32" opacity="0.5"/></svg>'),#1a1a1f;background-size:20px 20px;min-height:100vh;color:#c8c8d0;padding:1rem}
.container{max-width:900px;margin:0 auto}
h1,h2{font-family:'MedievalSharp',cursive}
.back-link{display:inline-block;color:#8b7355;text-decoration:none;font-size:.95em;margin-bottom:.75rem}
.back-link:hover{color:#a0a0c0}
.header{background:linear-gradient(180deg,#2d2d35 0%,#1a1a1f 100%);border:3px solid #5a5a6e;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;position:relative;box-shadow:inset 0 0 30px rgba(0,0,0,.5),0 5px 15px rgba(0,0,0,.5)}
.header::before{content:'';position:absolute;top:5px;left:5px;right:5px;bottom:5px;border:1px solid #45454f;border-radius:4px;pointer-events:none}
.header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.title{display:flex;align-items:center;gap:.75rem}
.title h1{color:#a0a0c0;font-size:1.8rem;text-shadow:2px 2px 4px #000}
.sword-icon{font-size:2rem}
.round-display{background:#0d0d10;border:2px solid #45454f;border-radius:6px;padding:.5rem 1rem;color:#a0a0c0;font-family:'MedievalSharp',cursive;font-size:1.1rem}
button{cursor:pointer;font-family:'Crimson Text',serif;transition:all .2s}
.btn-medieval{background:linear-gradient(180deg,#3a3a45 0%,#2d2d35 100%);border:2px solid #5a5a6e;color:#c8c8d0;padding:.6rem 1.2rem;border-radius:4px;font-size:.95rem;text-shadow:1px 1px 2px #000}
.btn-medieval:hover{background:linear-gradient(180deg,#45454f 0%,#3a3a45 100%);border-color:#a0a0c0;color:#a0a0c0}
.btn-danger{background:linear-gradient(180deg,#5c2a2a 0%,#3d1a1a 100%);border-color:#8b5555}
.btn-danger:hover{background:linear-gradient(180deg,#6d3333 0%,#4d2222 100%);border-color:#aa6666}
.btn-small{padding:.3rem .6rem;font-size:.8rem}
.panel{background:linear-gradient(180deg,#28282f 0%,#1e1e24 100%);border:3px solid #45454f;border-radius:8px;padding:1.25rem;margin-bottom:1.5rem;position:relative;box-shadow:inset 0 0 20px rgba(0,0,0,.4),0 4px 10px rgba(0,0,0,.4)}
.panel::before{content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid #35353d;border-radius:4px;pointer-events:none}
.panel h2{color:#a0a0c0;font-size:1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;text-shadow:1px 1px 3px #000;border-bottom:1px solid #45454f;padding-bottom:.5rem}
input,select{background:#0d0d10;border:2px solid #45454f;color:#c8c8d0;padding:.5rem;border-radius:4px;font-size:.95rem;font-family:'Crimson Text',serif}
input:focus,select:focus{outline:none;border-color:#a0a0c0;box-shadow:0 0 8px rgba(160,160,192,.3)}
input::placeholder{color:#5a5a6e}
.input-field{width:150px}
.form-row{display:flex;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.error-message{color:#d47c7c;font-size:.85rem;margin-top:.5rem;display:none;font-family:'MedievalSharp',cursive}
.input-error{border-color:#aa4444 !important;box-shadow:0 0 8px rgba(170,68,68,.3)}
.combatant{background:linear-gradient(180deg,#252528 0%,#1a1a1f 100%);border:2px solid #45454f;border-radius:6px;margin-bottom:.75rem;overflow:hidden;transition:all .3s}
.combatant.active{border-color:#a0a0c0;box-shadow:0 0 15px rgba(160,160,192,.3),inset 0 0 20px rgba(160,160,192,.1)}
.combatant-header{display:flex;align-items:center;gap:.75rem;padding:.75rem;cursor:pointer}
.init-badge{width:45px;height:45px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.2rem;font-family:'MedievalSharp',cursive;border:2px solid}
.init-badge.player{background:radial-gradient(circle,#1e3a5c 0%,#0d1a2d 100%);color:#7cb3d4;border-color:#4a7a9c}
.init-badge.enemy{background:radial-gradient(circle,#5c1e1e 0%,#2d0d0d 100%);color:#d47c7c;border-color:#8b4444}
.init-badge.bbeg{background:radial-gradient(circle,#5c1e5c 0%,#2d0d2d 100%);color:#d47cd4;border-color:#8b448b}
.combatant-info{flex:1}
.combatant-name{font-weight:600;font-size:1.1rem;display:flex;align-items:center;gap:.5rem}
.tag{font-size:.7rem;padding:.2rem .5rem;border-radius:3px;background:#a0a0c0;color:#1a1a1f;font-family:'MedievalSharp',cursive}
.skull{color:#aa6666}
.conditions{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.condition-tag{font-size:.7rem;padding:.15rem .4rem;border-radius:3px;background:rgba(160,160,192,.2);color:#a0a0c0;border:1px solid #45454f}
.damage-total{color:#d47c7c;font-weight:bold;font-size:1rem;display:flex;align-items:center;gap:.3rem;background:#2d1a1a;padding:.3rem .6rem;border-radius:4px;border:1px solid #5c3333}
.combatant-details{padding:.75rem;border-top:1px solid #35353d;display:none;background:rgba(0,0,0,.2)}
.combatant.expanded .combatant-details{display:block}
.detail-section{margin-bottom:.75rem}
.detail-section:last-child{margin-bottom:0}
.detail-section label{display:block;font-size:.85rem;color:#6a6a7a;margin-bottom:.4rem;font-family:'MedievalSharp',cursive}
.damage-input{display:flex;gap:.5rem;align-items:center}
.damage-log{font-size:.8rem;color:#6a6a7a;margin-top:.5rem;padding:.5rem;background:rgba(0,0,0,.2);border-radius:4px}
.damage-log span{background:rgba(139,68,68,.3);color:#d47c7c;padding:.2rem .4rem;border-radius:3px;margin-right:.3rem;border:1px solid #5c3333}
.tag-grid{display:flex;flex-wrap:wrap;gap:.3rem}
.tag-btn{font-size:.75rem;padding:.3rem .5rem;border-radius:3px;background:#28282f;color:#c8c8d0;border:1px solid #45454f;cursor:pointer;font-family:'Crimson Text',serif}
.tag-btn:hover{background:#35353d;border-color:#6a6a7a}
.tag-btn.active-condition{background:#4a4a6a;color:#a0a0c0;border-color:#a0a0c0}
.expand-arrow{color:#45454f;font-size:1.2rem;transition:transform .3s}
.combatant.expanded .expand-arrow{transform:rotate(180deg)}
.combatant.dead{opacity:.5;border-color:#3d2a2a}
.combatant.dead .combatant-header{background:rgba(60,30,30,.3)}
.combatant.fallen{opacity:.7;border-color:#3d3a3a}
.combatant.fallen .combatant-header{background:rgba(50,50,55,.3)}
.btn-death{background:linear-gradient(180deg,#4a1a1a 0%,#2d0d0d 100%);border-color:#6b3333}
.btn-death:hover{background:linear-gradient(180deg,#5c2222 0%,#3d1515 100%);border-color:#8b4444}
.btn-death.active{background:#2d0d0d;border-color:#aa4444;box-shadow:0 0 8px rgba(170,68,68,.5)}
.btn-fallen{background:linear-gradient(180deg,#3a3a45 0%,#2d2d35 100%);border-color:#5a5a6e}
.btn-fallen:hover{background:linear-gradient(180deg,#45454f 0%,#3a3a45 100%);border-color:#7a7a8e}
.btn-fallen.active{background:#2d2d35;border-color:#a0a0c0;box-shadow:0 0 8px rgba(160,160,192,.5)}
.status-dead{color:#aa4444;font-size:.8rem;font-family:'MedievalSharp',cursive;margin-left:.5rem}
.status-fallen{color:#a0a0c0;font-size:.8rem;font-family:'MedievalSharp',cursive;margin-left:.5rem}
.empty{text-align:center;padding:3rem;color:#45454f;font-family:'MedievalSharp',cursive;font-size:1.2rem}
.scroll-decoration{width:100%;height:20px;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 20"><path d="M0,10 Q50,0 100,10 T200,10" stroke="%2345454f" fill="none" stroke-width="1"/></svg>');background-repeat:repeat-x;margin:1rem 0;opacity:.5}
.bottom-controls{background:linear-gradient(180deg,#2d2d35 0%,#1a1a1f 100%);border:3px solid #5a5a6e;border-radius:8px;padding:1rem;margin-top:1rem;text-align:center;box-shadow:inset 0 0 20px rgba(0,0,0,.4),0 4px 10px rgba(0,0,0,.4)}
@media(max-width:768px){
  body{padding:.5rem}
  .header{padding:1rem}
  .title h1{font-size:1.4rem}
  .sword-icon{font-size:1.5rem}
  .header-content{flex-direction:column;gap:.75rem}
  .round-display{font-size:1rem;padding:.4rem .8rem}
  .btn-medieval{padding:.5rem 1rem;font-size:.9rem}
  .panel{padding:1rem}
  .panel h2{font-size:1.1rem}
  .form-row{flex-direction:column;gap:.5rem}
  .form-row>*{width:100%}
  .form-row button{width:100%}
  .input-field{width:100%}
  .combatant-header{flex-wrap:wrap;gap:.5rem;padding:.6rem}
  .init-badge{width:40px;height:40px;font-size:1rem}
  .combatant-name{font-size:1rem;flex-wrap:wrap}
  .tag{font-size:.65rem}
  .damage-total{font-size:.85rem;padding:.25rem .5rem}
  .combatant-details{padding:.6rem}
  .detail-section label{font-size:.8rem}
  .tag-grid{gap:.25rem}
  .tag-btn{font-size:.7rem;padding:.25rem .4rem}
  .damage-input{flex-wrap:wrap}
  .damage-input input{flex:1;min-width:80px}
  .damage-log{font-size:.75rem}
  .damage-log span{font-size:.7rem;padding:.15rem .3rem}
  .status-dead,.status-fallen{font-size:.7rem;display:block;margin-left:0;margin-top:.25rem}
  .expand-arrow{font-size:1rem}
  .empty{padding:2rem;font-size:1rem}
}
@media(max-width:480px){
  .title h1{font-size:1.2rem}
  .sword-icon{font-size:1.3rem}
  .round-display{font-size:.9rem}
  .btn-medieval{font-size:.85rem}
  .panel h2{font-size:1rem}
  .init-badge{width:35px;height:35px;font-size:.9rem}
  .combatant-name{font-size:.95rem}
  .tag-btn{font-size:.65rem;padding:.2rem .35rem}
  .conditions{gap:.2rem}
  .condition-tag{font-size:.65rem;padding:.1rem .3rem}
}
@media(min-width:769px) and (max-width:1024px){
  .container{max-width:95%}
  .form-row{flex-wrap:nowrap}
}
</style>
</head>
<body>
<div class="container">
<button type="button" class="back-link btn-medieval btn-small" onclick="if(window.opener){window.opener.focus();window.close();}else{window.location.href='index.html';}" style="margin-bottom:.75rem;border-radius:4px;">← Regresar a DragonKeep</button>

<div class="header">
<div class="header-content">
<div class="title">
<span class="sword-icon">⚔️</span>
<h1>Battle Tracker</h1>
</div>
<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
<div class="round-display">Ronda <span id="roundNum">1</span></div>
<div class="round-display" id="timerDisplay" style="display:none">⏱️ 0:00</div>
<button class="btn-medieval btn-small" onclick="toggleTimer()" id="timerToggle">⏱️</button>
<button class="btn-medieval btn-small" onclick="toggleSound()" id="soundToggle">🔊</button>
<button class="btn-medieval btn-small" onclick="toggleAddPanel()" id="addPanelToggle">🎭</button>
<button class="btn-medieval btn-danger btn-small" onclick="confirmReset()">🔄</button>
<button class="btn-medieval" onclick="nextTurn()">Siguiente ▶</button>
</div>
</div>
</div>

<div class="panel" id="addPanel">
<h2>📜 Agregar a la batalla</h2>
<div class="form-row">
<div style="display:flex;flex-wrap:wrap;align-items:stretch;gap:.5rem;flex:1;min-width:0;">
<button type="button" class="btn-medieval btn-small" id="nameSourceToggleBtn" onclick="toggleNameSource()" title="Cambiar entre lista y escribir nombre" style="align-self:stretch;padding:.4rem .6rem;">✏️</button>
<div id="nameSourceDropdownWrap" style="display:flex;align-items:center;gap:.5rem;flex:1;min-width:120px;">
<select id="adventurerSelect" class="input-field" style="min-width:160px;flex:1;" onchange="onAdventurerSelectChange()" title="Elegir aventurero">
<option value="">— Aventureros —</option>
</select>
</div>
<div id="nameSourceInputWrap" style="display:none;flex:1;min-width:120px;">
<input type="text" id="newName" placeholder="Nombre (NPC, personaje, etc.)" style="width:100%;min-width:140px" title="Escribir nombre manual">
</div>
</div>
<input type="number" id="newInit" placeholder="Init" class="input-field" onkeypress="return event.charCode>=48&&event.charCode<=57">
<button class="btn-medieval" onclick="addPlayer()">Agregar Aventurero</button>
<button class="btn-medieval btn-danger" onclick="addEnemy()">+ Enemigo 💀</button>
<button class="btn-medieval" onclick="addBBEG()" style="background:linear-gradient(180deg,#4a1a4a 0%,#2d0d2d 100%);border-color:#8b5588">+ BBEG 👹</button>
</div>
<div class="error-message" id="errorMsg"></div>
</div>

<div class="scroll-decoration" id="scrollDeco"></div>

<div id="combatantList">
<div class="empty">⚔️ La batalla aguarda...<br>¡Agrega aventureros y enemigos!</div>
</div>

<div id="bottomControls" class="bottom-controls" style="display:none">
<button class="btn-medieval" onclick="nextTurn()">Siguiente ▶</button>
</div>
</div>

<script>
var CONDITIONS=['Blinded','Charmed','Deafened','Frightened','Grappled','Incapacitated','Invisible','Paralyzed','Petrified','Poisoned','Prone','Restrained','Stunned','Unconscious','Concentrating'];

var combatants=[];
var currentTurn=0;
var round=1;

function loadAdventurerDropdown(){
  var sel=document.getElementById('adventurerSelect');
  if(!sel)return;
  sel.innerHTML='<option value="">— Aventureros —</option>';
  try{
    var raw=localStorage.getItem('dragonkeep_tracker_players');
    var list=raw?JSON.parse(raw):[];
    if(Array.isArray(list)&&list.length>0){
      list.forEach(function(p){
        var name=(p&&p.nombre)?String(p.nombre).trim():'';
        if(name)sel.appendChild(new Option(name,name));
      });
    }
  }catch(e){}
}

var nameSourceIsInput=false;

function onAdventurerSelectChange(){
  var sel=document.getElementById('adventurerSelect');
  var nameInput=document.getElementById('newName');
  if(!sel||!nameInput)return;
  var v=sel.value;
  nameInput.value=v?v:'';
}

function toggleNameSource(){
  nameSourceIsInput=!nameSourceIsInput;
  var dropdownWrap=document.getElementById('nameSourceDropdownWrap');
  var inputWrap=document.getElementById('nameSourceInputWrap');
  var btn=document.getElementById('nameSourceToggleBtn');
  if(dropdownWrap)dropdownWrap.style.display=nameSourceIsInput?'none':'flex';
  if(inputWrap)inputWrap.style.display=nameSourceIsInput?'flex':'none';
  if(btn)btn.textContent=nameSourceIsInput?'📋':'✏️';
  if(!nameSourceIsInput){ var ni=document.getElementById('newName'); if(ni)ni.value=''; }
}

function getPlayerNameForAdd(){
  if(nameSourceIsInput){
    var nameInput=document.getElementById('newName');
    return nameInput&&nameInput.value?nameInput.value.trim():'';
  }
  var sel=document.getElementById('adventurerSelect');
  return sel&&sel.value&&sel.value.trim()?sel.value.trim():'';
}
var enemyCount=0;
var bbegCount=0;
var timerSeconds=0;
var timerInterval=null;
var timerVisible=false;
var soundEnabled=true;
var audioCtx=null;

function getAudioCtx(){
  if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playPlayerSound(){
  if(!soundEnabled)return;
  var ctx=getAudioCtx();
  var o=ctx.createOscillator();
  var g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sine';
  o.frequency.setValueAtTime(523,ctx.currentTime);
  o.frequency.setValueAtTime(659,ctx.currentTime+0.1);
  o.frequency.setValueAtTime(784,ctx.currentTime+0.2);
  g.gain.setValueAtTime(0.3,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.01,ctx.currentTime+0.4);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime+0.4);
}

function playEnemySound(){
  if(!soundEnabled)return;
  var ctx=getAudioCtx();
  var o=ctx.createOscillator();
  var g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(196,ctx.currentTime);
  o.frequency.setValueAtTime(147,ctx.currentTime+0.15);
  g.gain.setValueAtTime(0.2,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.01,ctx.currentTime+0.3);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime+0.3);
}

function playDamageSound(){
  if(!soundEnabled)return;
  var ctx=getAudioCtx();
  var o=ctx.createOscillator();
  var g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='square';
  o.frequency.setValueAtTime(300,ctx.currentTime);
  o.frequency.setValueAtTime(200,ctx.currentTime+0.05);
  g.gain.setValueAtTime(0.15,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.01,ctx.currentTime+0.15);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime+0.15);
}

function playDeathSound(){
  if(!soundEnabled)return;
  var ctx=getAudioCtx();
  var o=ctx.createOscillator();
  var g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(250,ctx.currentTime);
  o.frequency.linearRampToValueAtTime(80,ctx.currentTime+0.5);
  g.gain.setValueAtTime(0.25,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.01,ctx.currentTime+0.5);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime+0.5);
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  var btn=document.getElementById('soundToggle');
  btn.textContent=soundEnabled?'🔊':'🔇';
  btn.style.borderColor=soundEnabled?'#a0a0c0':'#5a5a6e';
}

function startTimer(){
  timerSeconds=0;
  updateTimerDisplay();
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerSeconds++;
    updateTimerDisplay();
  },1000);
}

function updateTimerDisplay(){
  var mins=Math.floor(timerSeconds/60);
  var secs=timerSeconds%60;
  document.getElementById('timerDisplay').textContent='⏱️ '+mins+':'+(secs<10?'0':'')+secs;
}

function toggleTimer(){
  timerVisible=!timerVisible;
  var display=document.getElementById('timerDisplay');
  var btn=document.getElementById('timerToggle');
  if(timerVisible){
    display.style.display='block';
    btn.style.borderColor='#a0a0c0';
    startTimer();
  }else{
    display.style.display='none';
    btn.style.borderColor='#5a5a6e';
    if(timerInterval)clearInterval(timerInterval);
  }
}

function showError(msg){
  var errorEl=document.getElementById('errorMsg');
  errorEl.textContent='⚠️ '+msg;
  errorEl.style.display='block';
  setTimeout(function(){errorEl.style.display='none';},3000);
}

function sortCombatants(){
  combatants.sort(function(a,b){
    if(a.isBBEG&&!b.isBBEG)return -1;
    if(!a.isBBEG&&b.isBBEG)return 1;
    return b.initiative-a.initiative;
  });
}

function addPlayer(){
  var nameInput=document.getElementById('newName');
  var initInputEl=document.getElementById('newInit');
  var adventurerSelect=document.getElementById('adventurerSelect');
  var name=getPlayerNameForAdd();
  var initInput=initInputEl?initInputEl.value:'';
  
  if(nameInput)nameInput.classList.remove('input-error');
  if(initInputEl)initInputEl.classList.remove('input-error');
  
  if(!name&&!initInput){
    if(nameInput)nameInput.classList.add('input-error');
    if(initInputEl)initInputEl.classList.add('input-error');
    showError('¡Ingresa el nombre y la iniciativa del aventurero!');
    return;
  }
  if(!name){
    if(nameInput)nameInput.classList.add('input-error');
    showError('¡Elige un aventurero o pulsa "Escribir" y escribe un nombre!');
    return;
  }
  if(!initInput){
    if(initInputEl)initInputEl.classList.add('input-error');
    showError('¡Ingresa la iniciativa del aventurero!');
    return;
  }
  var init=parseInt(initInput,10);
  if(isNaN(init)){
    if(initInputEl)initInputEl.classList.add('input-error');
    showError('¡La iniciativa debe ser un número!');
    return;
  }
  combatants.push({id:Date.now(),name:name,initiative:init,isEnemy:false,isBBEG:false,conditions:[],damage:0,damageLog:[],dead:false,fallen:false});
  sortCombatants();
  if(nameInput)nameInput.value='';
  if(initInputEl)initInputEl.value='';
  if(adventurerSelect)adventurerSelect.value='';
  render();
}

function addEnemy(){
  enemyCount++;
  var name='Enemigo '+enemyCount;
  var init=Math.floor(Math.random()*20)+1;
  combatants.push({id:Date.now(),name:name,initiative:init,isEnemy:true,isBBEG:false,conditions:[],damage:0,damageLog:[],dead:false,fallen:false});
  sortCombatants();
  render();
}

function addBBEG(){
  bbegCount++;
  var name=bbegCount>1?'BBEG '+bbegCount:'BBEG';
  var init=99;
  combatants.push({id:Date.now(),name:name,initiative:init,isEnemy:true,isBBEG:true,conditions:[],damage:0,damageLog:[],dead:false,fallen:false});
  sortCombatants();
  render();
}

function removeCombatant(id){
  var idx=combatants.findIndex(function(c){return c.id===id;});
  combatants=combatants.filter(function(c){return c.id!==id;});
  if(idx<=currentTurn&&currentTurn>0)currentTurn--;
  render();
}

function nextTurn(){
  if(combatants.length===0)return;
  if(currentTurn>=combatants.length-1){
    currentTurn=0;
    round++;
    document.getElementById('roundNum').textContent=round;
  }else{
    currentTurn++;
  }
  if(timerVisible)startTimer();
  var current=combatants[currentTurn];
  if(current.isEnemy)playEnemySound();
  else playPlayerSound();
  render();
}

function toggleExpand(id){
  var el=document.querySelector('[data-id="'+id+'"]');
  el.classList.toggle('expanded');
}

function toggleCondition(id,cond){
  var c=combatants.find(function(x){return x.id===id;});
  var idx=c.conditions.indexOf(cond);
  if(idx>-1)c.conditions.splice(idx,1);
  else c.conditions.push(cond);
  render();
}

function addDamage(id){
  var input=document.getElementById('dmg-'+id);
  var amt=parseInt(input.value)||0;
  if(amt<=0)return;
  var c=combatants.find(function(x){return x.id===id;});
  c.damage+=amt;
  c.damageLog.push({round:round,amount:amt});
  input.value='';
  playDamageSound();
  render();
}

function toggleDead(id){
  var c=combatants.find(function(x){return x.id===id;});
  c.dead=!c.dead;
  if(c.dead)playDeathSound();
  render();
}

function toggleFallen(id){
  var c=combatants.find(function(x){return x.id===id;});
  c.fallen=!c.fallen;
  render();
}

function toggleAddPanel(){
  var panel=document.getElementById('addPanel');
  var deco=document.getElementById('scrollDeco');
  var btn=document.getElementById('addPanelToggle');
  if(panel.style.display==='none'){
    panel.style.display='block';
    deco.style.display='block';
    btn.style.borderColor='#a0a0c0';
  }else{
    panel.style.display='none';
    deco.style.display='none';
    btn.style.borderColor='#5a5a6e';
  }
}

function confirmReset(){
  if(combatants.length===0)return;
  combatants=[];
  currentTurn=0;
  round=1;
  enemyCount=0;
  bbegCount=0;
  document.getElementById('roundNum').textContent='1';
  document.getElementById('addPanel').style.display='block';
  document.getElementById('scrollDeco').style.display='block';
  document.getElementById('addPanelToggle').style.borderColor='#a0a0c0';
  timerSeconds=0;
  updateTimerDisplay();
  if(timerInterval)clearInterval(timerInterval);
  render();
}

function render(){
  var list=document.getElementById('combatantList');
  var bottomControls=document.getElementById('bottomControls');
  if(combatants.length===0){
    list.innerHTML='<div class="empty">⚔️ La batalla aguarda...<br>¡Agrega aventureros y enemigos!</div>';
    bottomControls.style.display='none';
    return;
  }
  bottomControls.style.display='block';
  list.innerHTML=combatants.map(function(c,idx){
    return '<div class="combatant '+(idx===currentTurn?'active':'')+' '+(c.dead?'dead':'')+' '+(c.fallen?'fallen':'')+'" data-id="'+c.id+'">'+
      '<div class="combatant-header" onclick="toggleExpand('+c.id+')">'+
        '<div class="init-badge '+(c.isBBEG?'bbeg':c.isEnemy?'enemy':'player')+'">'+c.initiative+'</div>'+
        '<div class="combatant-info">'+
          '<div class="combatant-name">'+
            c.name+' '+(c.isBBEG?'<span class="skull">👹</span>':c.isEnemy?'<span class="skull">💀</span>':'')+
            (idx===currentTurn?'<span class="tag">EN TURNO</span>':'')+
            (c.dead?'<span class="status-dead">☠️ MUERTO</span>':'')+
            (c.fallen?'<span class="status-fallen">⬇️ CAÍDO</span>':'')+
          '</div>'+
          '<div class="conditions">'+
            c.conditions.map(function(cond){return '<span class="condition-tag">'+cond+'</span>';}).join('')+
          '</div>'+
        '</div>'+
        (c.isEnemy?'<div class="damage-total">🩸 '+c.damage+'</div>':'')+
        '<button class="btn-medieval btn-danger btn-small" onclick="event.stopPropagation();removeCombatant('+c.id+')">✕</button>'+
        '<span class="expand-arrow">▼</span>'+
      '</div>'+
      '<div class="combatant-details">'+
        (c.isEnemy?
        '<div class="detail-section">'+
          '<label>⚔️ Infligir Daño</label>'+
          '<div class="damage-input">'+
            '<input type="number" id="dmg-'+c.id+'" placeholder="Daño">'+
            '<button class="btn-medieval btn-danger btn-small" onclick="addDamage('+c.id+')">+ Daño</button>'+
          '</div>'+
          (c.damageLog.length>0?'<div class="damage-log">📖 Historial: '+c.damageLog.map(function(d){return '<span>R'+d.round+': '+d.amount+'</span>';}).join('')+'</div>':'')+
          '<button class="btn-medieval btn-death btn-small '+(c.dead?'active':'')+'" onclick="toggleDead('+c.id+')" style="margin-top:.5rem">☠️ '+(c.dead?'Revivir':'Muerte')+'</button>'+
        '</div>'
        :'')+
        (!c.isEnemy?
        '<div class="detail-section">'+
          '<label>⬇️ Estado del Aventurero</label>'+
          '<button class="btn-medieval btn-fallen btn-small '+(c.fallen?'active':'')+'" onclick="toggleFallen('+c.id+')">⬇️ '+(c.fallen?'Levantar':'Caído')+'</button>'+
        '</div>'
        :'')+
        '<div class="detail-section">'+
          '<label>🔮 Condiciones</label>'+
          '<div class="tag-grid">'+
            CONDITIONS.map(function(cond){return '<button class="tag-btn '+(c.conditions.indexOf(cond)>-1?'active-condition':'')+'" onclick="toggleCondition('+c.id+',\''+cond+'\')">'+cond+'</button>';}).join('')+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

loadAdventurerDropdown();
render();
</script>
</body>
</html>
